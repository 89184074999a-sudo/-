<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR: картинка статьи → видео</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image.prod.js"></script>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: ./targets.mind;"
           vr-mode-ui="enabled: false"
           device-orientation-permission-ui="enabled: false">
    <a-assets>
      <!-- Видео для первой картинки -->
      <video id="video1" src="./video1.mp4" autoplay loop muted playsinline></video>
      <!-- Видео для второй картинки -->
      <video id="video2" src="./video2.mp4" autoplay loop muted playsinline></video>
    </a-assets>

    <!-- Привязка к картинке №1 -->
    <a-entity mindar-image-target="imageTargetIndex: 0">
      <a-video src="#video1" width="1.5" height="1" position="0 0 0" rotation="0 0 0"></a-video>
    </a-entity>

    <!-- Привязка к картинке №2 -->
    <a-entity mindar-image-target="imageTargetIndex: 1">
      <a-video src="#video2" width="1.5" height="1" position="0 0 0" rotation="0 0 0"></a-video>
    </a-entity>
  </a-scene>
</body>
</html>
